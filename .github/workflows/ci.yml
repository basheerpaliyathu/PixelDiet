name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Unit tests (pure JVM gear math)
        run: ./gradlew :pixeldiet:testReleaseUnitTest

      - name: Build library AAR
        run: ./gradlew :pixeldiet:assembleRelease

      - name: Verify the AAR ships NO native libraries (the no-.so guarantee)
        run: |
          AAR=$(find pixeldiet/build/outputs/aar -name '*-release.aar' | head -n1)
          echo "Inspecting $AAR"
          if unzip -l "$AAR" | grep -E '\.so$|(^|/)jni/'; then
            echo "::error::Native library found in AAR — PixelDiet must remain pure-JVM."
            exit 1
          fi
          echo "OK: no .so / jni entries in the AAR."

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug
